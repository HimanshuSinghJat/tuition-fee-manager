<!DOCTYPE html>
<html>
<head>
    <title>Tuition Fee Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.9);
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
        }

        .container {
            width: 100%;
            max-width: 450px;
            margin: 20px;
            background: var(--glass-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 800;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .links {
            text-align: center;
            margin-top: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Add Student</h2>

    <div class="input-group">
        <label>Name</label>
        <input type="text" id="name">
    </div>

    <div class="input-group">
        <label>Class</label>
        <input type="text" id="class">
    </div>

    <div class="input-group">
        <label>Fee</label>
        <input type="number" id="fee">
    </div>

    <!-- Months -->
    <div class="grid">

        <div class="input-group">
            <label>Start Month</label>
            <select id="startMonth">
                <option value="">Select</option>
                <option value="0">Jan</option><option value="1">Feb</option>
                <option value="2">Mar</option><option value="3">Apr</option>
                <option value="4">May</option><option value="5">Jun</option>
                <option value="6">Jul</option><option value="7">Aug</option>
                <option value="8">Sep</option><option value="9">Oct</option>
                <option value="10">Nov</option><option value="11">Dec</option>
            </select>
        </div>

        <div class="input-group">
            <label>End Month</label>
            <select id="endMonth">
                <option value="">Select</option>
                <option value="0">Jan</option><option value="1">Feb</option>
                <option value="2">Mar</option><option value="3">Apr</option>
                <option value="4">May</option><option value="5">Jun</option>
                <option value="6">Jul</option><option value="7">Aug</option>
                <option value="8">Sep</option><option value="9">Oct</option>
                <option value="10">Nov</option><option value="11">Dec</option>
            </select>
        </div>

    </div>

    <!-- Years -->
    <div class="grid">

        <div class="input-group">
            <label>Start Year</label>
            <select id="startYear">
                <option value="">Select</option>
                <option>2025</option>
                <option>2026</option>
                <option>2027</option>
            </select>
        </div>

        <div class="input-group">
            <label>End Year</label>
            <select id="endYear">
                <option value="">Select</option>
                <option>2025</option>
                <option>2026</option>
                <option>2027</option>
            </select>
        </div>

    </div>

    <button onclick="addStudent()">Add Student</button>

    <div class="links">
        <a href="dashboard.html">View Dashboard →</a>
    </div>

</div>

<script>

function addStudent(){

    const name = document.getElementById("name").value;
    const studentClass = document.getElementById("class").value;
    const fee = document.getElementById("fee").value;

    const startMonth = document.getElementById("startMonth").value;
    const endMonth = document.getElementById("endMonth").value;

    const startYear = document.getElementById("startYear").value;
    const endYear = document.getElementById("endYear").value;

    if (!name || !studentClass || !fee || startMonth === "" || endMonth === "" || !startYear || !endYear) {
        alert("Please fill all fields");
        return;
    }

    const student = {
        name: name,
        class: studentClass,
        fee: Number(fee),
        startMonth: Number(startMonth),
        endMonth: Number(endMonth),
        startYear: Number(startYear),
        endYear: Number(endYear),
        payments: Array(12).fill(false),
        advancePaid: false
    };

    let students = JSON.parse(localStorage.getItem("students")) || [];

    students.push(student);

    localStorage.setItem("students", JSON.stringify(students));

    alert("Student added!");

    location.reload();
}

</script>

</body>
</html>
